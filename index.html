<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵魂发酵实验室 · 专属检测 | 单次发酵鉴定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 全局背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(78, 205, 196, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 107, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* 封面样式 */
        .cover {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="white" opacity="0.3"/><circle cx="80" cy="40" r="1.5" fill="white" opacity="0.3"/><circle cx="40" cy="80" r="2.5" fill="white" opacity="0.3"/></svg>');
            opacity: 0.3;
        }

        .cover h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }

        .cover h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .cover p {
            font-size: 1em;
            position: relative;
            line-height: 1.6;
            z-index: 2;
        }

        /* 8bit像素风元素 - 发酵气泡 */
        .pixel-bubble {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
            z-index: 1;
        }

        .pixel-bubble:nth-child(1) { top: 20%; left: 10%; }
        .pixel-bubble:nth-child(2) { top: 60%; right: 15%; }
        .pixel-bubble:nth-child(3) { bottom: 30%; left: 25%; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* 问卷样式 */
        .questionnaire {
            display: none;
            padding: 30px;
            background: #fafafa;
        }

        .question {
            background: white;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #4ecdc4;
            display: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .question.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
            position: relative;
            padding-left: 15px;
        }

        .question h3::before {
            content: '•';
            color: #ff6b6b;
            position: absolute;
            left: 0;
            top: 0;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            background: white;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(78, 205, 196, 0.1), transparent);
            transition: left 0.5s;
        }

        .option:hover::before {
            left: 100%;
        }

        .option:hover {
            border-color: #4ecdc4;
            background: #f0fff4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.1);
        }

        .option.selected {
            border-color: #ff6b6b;
            background: #ffebee;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            width: 0%;
            transition: width 0.3s;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .nav-buttons {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 加载页面 */
        .loading {
            display: none;
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f3ff 100%);
            position: relative;
            overflow: hidden;
        }

        .loading::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1" fill="%234ecdc4" opacity="0.2"/><circle cx="90" cy="30" r="1.5" fill="%23ff6b6b" opacity="0.2"/><circle cx="30" cy="70" r="0.8" fill="%234ecdc4" opacity="0.2"/></svg>');
            opacity: 0.3;
        }

        .loading-animation {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            position: relative;
            z-index: 1;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            position: absolute;
            animation: loading-pulse 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { left: 8px; animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { left: 8px; animation-delay: -0.16s; }
        .loading-dot:nth-child(3) { left: 32px; animation-delay: 0s; }

        @keyframes loading-pulse {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .loading-text {
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
            z-index: 1;
            position: relative;
        }

        /* 结果页面 */
        .result {
            display: none;
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #fff8f0 0%, #f0fff8 100%);
            position: relative;
            overflow: hidden;
        }

        .result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="1.5" fill="%23ff6b6b" opacity="0.1"/><circle cx="80" cy="60" r="1" fill="%234ecdc4" opacity="0.1"/><circle cx="50" cy="80" r="1.2" fill="%23ff6b6b" opacity="0.1"/></svg>');
            opacity: 0.3;
        }

        .diagnosis-card {
            background: white;
            border: 3px dashed #d2691e;
            padding: 30px;
            border-radius: 15px;
            position: relative;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(210, 105, 30, 0.1);
            z-index: 1;
        }

        .diagnosis-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px dashed rgba(210, 105, 30, 0.2);
            border-radius: 15px;
            margin: 5px;
            pointer-events: none;
        }

        .diagnosis-header {
            border-bottom: 2px solid #d2691e;
            padding-bottom: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .diagnosis-number {
            font-size: 0.9em;
            color: #d2691e;
            margin-bottom: 5px;
        }

        .diagnosis-title {
            font-size: 1.3em;
            color: #d2691e;
            font-weight: bold;
        }

        .result-type {
            font-size: 1.5em;
            color: #ff6b6b;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .result-status {
            background: #fff8dc;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            border-left: 4px solid #d2691e;
        }

        .result-traits {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            border-left: 4px solid #4ecdc4;
        }

        .result-advice {
            background: #e8f5e8;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            border-left: 4px solid #4ecdc4;
        }

        .share-button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            margin-top: 20px;
        }

        .pixel-microbe {
            width: 80px;
            height: 80px;
            margin: 20px auto;
            position: relative;
        }

        .microbe-body {
            width: 60px;
            height: 60px;
            background: #4ecdc4;
            border-radius: 50%;
            position: relative;
            margin: 0 auto;
            animation: microbeFloat 3s ease-in-out infinite;
        }

        @keyframes microbeFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .microbe-eye {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 20px;
        }

        .microbe-eye.left { left: 15px; }
        .microbe-eye.right { right: 15px; }

        .microbe-mouth {
            width: 20px;
            height: 10px;
            background: white;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bubble {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.7);
            border: 2px solid white;
            border-radius: 50%;
            animation: bubbleFloat 3s ease-in-out infinite;
        }

        .bubble.b1 { top: -10px; left: 10px; animation-delay: 0s; }
        .bubble.b2 { top: -5px; right: 15px; animation-delay: 0.5s; }
        .bubble.b3 { bottom: -8px; left: 20px; animation-delay: 1s; }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .cover h1 {
                font-size: 2em;
            }
            
            .cover h2 {
                font-size: 1em;
            }
            
            .questionnaire, .loading, .result {
                padding: 20px 15px;
            }
            
            .option {
                padding: 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 封面 -->
        <div class="cover" id="cover">
            <div class="pixel-bubble"></div>
            <div class="pixel-bubble"></div>
            <div class="pixel-bubble"></div>
            <h1>🧪 灵魂发酵实验室</h1>
            <h2>你的灵魂正在悄悄发酵？测测发酵到第几层了！</h2>
            <p>每个人的灵魂都是一罐待发酵的食材，作息是温度，情绪是菌群，藏着不为人知的发酵状态。<br/>30道题，全看你的日常本能反应，生成专属灵魂发酵诊断书～</p>
            <button id="startBtn">开始测试</button>
        </div>

        <!-- 问卷 -->
        <div class="questionnaire" id="questionnaire">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="questionsContainer"></div>
            <div class="nav-buttons">
                <button id="prevBtn" disabled>上一题</button>
                <button id="nextBtn">下一题</button>
            </div>
        </div>

        <!-- 加载页面 -->
        <div class="loading" id="loading">
            <div class="loading-animation">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
            <div class="loading-text" id="loadingText">正在连接银河系微生物数据库...</div>
        </div>

        <!-- 结果页面 -->
        <div class="result" id="result">
            <div class="pixel-microbe">
                <div class="microbe-body">
                    <div class="microbe-eye left"></div>
                    <div class="microbe-eye right"></div>
                    <div class="microbe-mouth"></div>
                    <div class="bubble b1"></div>
                    <div class="bubble b2"></div>
                    <div class="bubble b3"></div>
                </div>
            </div>
            
            <div class="diagnosis-card">
                <div class="diagnosis-header">
                    <div class="diagnosis-number">编号：SL-FJ-<span id="randomNumber">0001</span></div>

                    <div>检测项目：灵魂发酵程度、菌群类型判定</div>
                    <div>检测状态：已完成</div>
                </div>
                
                <div class="result-type" id="resultType"></div>
                
                <div class="result-status" id="resultStatus"></div>
                
                <div class="result-traits" id="resultTraits"></div>
                
                <div class="result-advice" id="resultAdvice"></div>
                
                <button id="shareResultBtn" class="share-button">📤 分享我的发酵诊断书</button>
            </div>
            
            <p style="margin-top: 20px; color: #666; font-size: 0.9em;">
                🌿 灵魂发酵仅此一次，你的专属诊断已存档，无法再次测试。
            </p>
        </div>
    </div>

    <script>
        // ======================= 题库 (保持不变) =======================

            ["观察很久，反复考量，谨慎抉择", "评估利弊，稳妥抓住，不冒进", "毫不犹豫，立马抓住，敢闯敢拼", "害怕失败，犹豫不决，最终错过"],
            ["极少波动，情绪始终平稳，波澜不惊", "偶尔波动，受外界影响小", "波动明显，易被外界带动，大起大落", "频繁波动，一点小事就情绪失控"],
            ["适应很慢，需要长时间才能融入", "正常适应，慢慢熟悉，不慌不忙", "快速适应，自来熟，立马融入", "难以适应，敏感不安，极度抵触"],
            ["自我沉淀，慢慢消化，无需他人安慰", "找人倾诉，说出来就释怀", "用行动发泄，运动、工作，转移注意力", "陷在情绪里，无法自拔，需要他人长时间安抚"],
            ["默默做事，稳定大局，不争不抢", "配合他人，靠谱踏实，完成分内事", "主导节奏，带动团队，核心发力", "细心敏感，容易内耗，抗压能力弱"],
            ["接受很慢，喜欢稳定，抗拒改变", "正常接受，不抗拒也不主动追求", "喜欢改变，热衷新鲜事物，勇于尝试", "害怕改变，缺乏安全感，极度抵触"],
            ["上午，早起后精神平稳，下午渐弱", "中午到下午，状态始终均匀", "晚上，夜晚越晚越精神，状态绝佳", "无固定峰值，全天状态都很差"],
            ["毫无波澜，专注自己，不羡慕不嫉妒", "适度羡慕，激励自己，正常看待", "瞬间斗志满满，想要努力赶超", "自我否定，焦虑自卑，情绪低落"],
            ["极度拖延，不到最后不行动", "偶尔拖延，能按时完成", "从不拖延，提前完成，效率极高", "因焦虑拖延，越拖越焦虑"],
            ["慢慢解决，不紧不慢，不急着出结果", "稳步解决，寻求方法，正常攻克", "迎难而上，越难越有干劲，快速解决", "退缩逃避，不敢面对，焦虑不安"],
            ["不太喜欢，偏爱清淡原味食物", "正常接受，偶尔吃一点", "超级喜欢，甜食/发酵食品是最爱", "喜欢吃，但吃多了会情绪不适"],
            ["边界感极强，喜欢独处，不喜打扰", "边界感适中，友好但保持距离", "边界感弱，热情主动，乐于亲近他人", "边界感模糊，敏感脆弱，易被他人影响"],
            ["安静发呆、看书、做慢节奏的事", "做日常琐事，适度放松，不紧不慢", "尝试新鲜事，出门游玩，做有挑战的事", "无所事事，刷手机，越闲越焦虑"],
            ["淡淡接受，不骄傲，情绪无波动", "开心感谢，适度开心，很快平复", "极度开心，充满动力，更加努力", "不好意思，怀疑自己，情绪拘谨"],
            ["顺其自然，走一步看一步，不焦虑", "有简单规划，稳步前行，心态平和", "充满期待，目标明确，想要快速成长", "极度焦虑，担忧未来，胡思乱想"],
            ["快速入睡，睡眠安稳，无多梦情况", "正常入睡，偶尔多梦，睡眠质量尚可", "入睡困难，思绪活跃，越晚越清醒", "失眠多梦，睡眠浅，易醒，睡眠极差"]
        ];

        // ---------- 存储key ----------
        const STORAGE_COMPLETED = "soul_ferment_completed";
        const STORAGE_RESULT = "soul_ferment_result";
        const STORAGE_ANSWERS = "soul_ferment_answers";
        const STORAGE_CURRENT_Q = "soul_ferment_current_q";

        let currentQuestion = 0;
        let answers = new Array(30).fill(null);
        let isCompleted = false;      // 全局已完成标志

        // DOM 元素
        const coverDiv = document.getElementById('cover');
        const questionnaireDiv = document.getElementById('questionnaire');
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shareBtn = document.getElementById('shareResultBtn');

        // ========== 辅助函数: 计算得分 & 生成结果对象 ==========
        function computeResultFromAnswers(answerArray) {
            const totalScore = answerArray.reduce((sum, ans) => sum + (ans + 1), 0);
            let resultData = {};
            if (totalScore >= 30 && totalScore <= 50) {
                resultData = {
                    type: "你是「老菌陈酿型」灵魂",
                    status: "低度发酵，发酵温度恒定，菌群活性平缓，无多余气泡，质地醇厚",
                    traits: "平时看着寡淡内敛，不争不抢，情绪毫无波澜，像久酿的米酒/老茶，越沉淀越有味道，耐得住寂寞，后劲极强",
                    advice: "适合做陈年佳酿、团队定海神针、长期靠谱的守护者"
                };
            } else if (totalScore >= 51 && totalScore <= 70) {
                resultData = {
                    type: "你是「天然酵母型」灵魂",
                    status: "中度正常发酵，菌群平衡，温度适宜，发酵过程平稳无差错，口感温润",
                    traits: "情绪稳定，节奏舒适，不冒进不内耗，待人处事恰到好处，和任何人都能和谐相处，无明显短板",
                    advice: "适合做日常主食、团队基础盘、身边的暖心陪伴者"
                };
            } else if (totalScore >= 71 && totalScore <= 95) {
                resultData = {
                    type: "你是「酵母菌型」灵魂",
                    status: "高度活性发酵，遇糖分（机会/鼓励）瞬间膨胀，气泡疯狂滋生，爆发力拉满",
                    traits: "平时看着温吞佛系，不起眼，一旦遇到机会、认可或热爱的事，就会瞬间爆发，潜力无限，行动力爆棚",
                    advice: "适合做松软面包、团队核心、破局者与开拓者"
                };
            } else {
                resultData = {
                    type: "你是「醋酸菌型」灵魂",
                    status: "过度发酵，菌群活性过强，温度偏高，易发酸冒泡，情绪浓度极高",
                    traits: "细腻敏感，感知力超强，能捕捉细微情绪，容易emo内耗，像发酵过度的酸奶/果醋，酸涩但极具共情力",
                    advice: "适合做创意创作者、情绪观察者、最懂他人的共情小天使"
                };
            }
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            return { ...resultData, randomNumber: randomNum };
        }

        // 保存未完成进度 (答案 + 当前题号)
        function saveUnfinishedProgress() {
            localStorage.setItem(STORAGE_ANSWERS, JSON.stringify(answers));
            localStorage.setItem(STORAGE_CURRENT_Q, currentQuestion);
        }

        // 清除未完成进度 (提交后或者重置时)
        function clearUnfinishedProgress() {
            localStorage.removeItem(STORAGE_ANSWERS);
            localStorage.removeItem(STORAGE_CURRENT_Q);
        }

        // 保存完成状态 (结果 + 完成标志)
        function saveCompletedState(resultData) {
            localStorage.setItem(STORAGE_COMPLETED, 'true');
            localStorage.setItem(STORAGE_RESULT, JSON.stringify(resultData));
            clearUnfinishedProgress();  // 完成时删除未完成草稿
        }

        // 加载已完成的结果，并直接展示结果页面
        function loadCompletedAndShow() {
            const storedResult = localStorage.getItem(STORAGE_RESULT);
            if (storedResult) {
                const result = JSON.parse(storedResult);
                displayResultOnPage(result);
            } else {
                // 极少数异常: 标志完成但无结果，重新生成默认
                const fallback = { type: "灵魂发酵档案", status: "未知状态", traits: "请重新尝试", advice: "联系实验室", randomNumber: "9999" };
                displayResultOnPage(fallback);
            }
            // 显示结果，隐藏其他
            coverDiv.style.display = 'none';
            questionnaireDiv.style.display = 'none';
            loadingDiv.style.display = 'none';
            resultDiv.style.display = 'block';
            isCompleted = true;
        }

        // 渲染结果到页面
        function displayResultOnPage(resultData) {
            document.getElementById('resultType').textContent = resultData.type;
            document.getElementById('resultStatus').innerHTML = `<strong>发酵状态：</strong>${resultData.status}`;
            document.getElementById('resultTraits').innerHTML = `<strong>特质描述：</strong>${resultData.traits}`;
            document.getElementById('resultAdvice').innerHTML = `<strong>适配定位：</strong>${resultData.advice}`;
            document.getElementById('randomNumber').textContent = resultData.randomNumber;
        }

        // 提交最终结果 (动画 + 存储)
        function submitFinalResult() {
            if (isCompleted) return;
            // 再次检查完整性
            if (answers.some(a => a === null)) {
                alert('请完成所有题目后再提交！');
                return;
            }
            // 显示加载动画
            questionnaireDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            const loadingTexts = [
                "正在连接银河系微生物数据库...",
                "正在提取你的灵魂DNA样本...",
                "正在询问你的专属守护星...",
                "正在监测灵魂发酵温度...",
                "正在筛查情绪菌群活性...",
                "正在校准精神发酵刻度...",
                "正在召唤发酵菌小精灵...",
                "正在破解灵魂发酵密码..."
            ];
            let textIndex = 0;
            const loadingInterval = setInterval(() => {
                document.getElementById('loadingText').textContent = loadingTexts[textIndex];
                textIndex = (textIndex + 1) % loadingTexts.length;
            }, 2000);
            
            setTimeout(() => {
                clearInterval(loadingInterval);
                // 计算结果并存储
                const finalResult = computeResultFromAnswers(answers);
                saveCompletedState(finalResult);
                isCompleted = true;
                loadingDiv.style.display = 'none';
                displayResultOnPage(finalResult);
                resultDiv.style.display = 'block';
            }, 5000);
        }

        // 恢复未完成进度 (从localStorage加载answers, currentQuestion)
        function loadUnfinishedAndResume() {
            const savedAnswers = localStorage.getItem(STORAGE_ANSWERS);
            const savedQ = localStorage.getItem(STORAGE_CURRENT_Q);
            if (savedAnswers) {
                try {
                    const parsed = JSON.parse(savedAnswers);
                    if (Array.isArray(parsed) && parsed.length === 30) {
                        answers = parsed;
                    }
                } catch(e) {}
            }
            if (savedQ !== null && !isNaN(parseInt(savedQ))) {
                currentQuestion = parseInt(savedQ);
                if (currentQuestion < 0) currentQuestion = 0;
                if (currentQuestion >= 30) currentQuestion = 29;
            }
            // 重新渲染DOM并高亮选中项
            renderQuestionsWithSelections();
            // 显示问卷区域，隐藏封面和结果
            coverDiv.style.display = 'none';
            questionnaireDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            loadingDiv.style.display = 'none';
            // 激活当前问题
            document.querySelectorAll('.question').forEach((q, idx) => {
                if (idx === currentQuestion) q.classList.add('active');
                else q.classList.remove('active');
            });
            updateProgress();
            updateNavButtons();
        }

        // 渲染所有题目，并根据answers恢复选中样式
        function renderQuestionsWithSelections() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.id = `question-${i}`;
                questionDiv.innerHTML = `
                    <h3>${i + 1}. ${questions[i]}</h3>
                    <div class="options">
                        <div class="option" data-question="${i}" data-option="0">A. ${options[i][0]}</div>
                        <div class="option" data-question="${i}" data-option="1">B. ${options[i][1]}</div>
                        <div class="option" data-question="${i}" data-option="2">C. ${options[i][2]}</div>
                        <div class="option" data-question="${i}" data-option="3">D. ${options[i][3]}</div>
                    </div>
                `;
                container.appendChild(questionDiv);
            }
            // 重新绑定选项事件，并恢复已选样式
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => {
                const qIdx = parseInt(opt.getAttribute('data-question'));
                const optIdx = parseInt(opt.getAttribute('data-option'));
                if (answers[qIdx] === optIdx) {
                    opt.classList.add('selected');
                }
                opt.addEventListener('click', (e) => {
                    if (isCompleted) return;
                    const qIndex = parseInt(opt.getAttribute('data-question'));
                    const oIndex = parseInt(opt.getAttribute('data-option'));
                    selectOptionHandler(qIndex, oIndex);
                });
            });
        }

        // 处理选项点击
        function selectOptionHandler(questionIndex, optionIndex) {
            if (isCompleted) return;
            answers[questionIndex] = optionIndex;
            // 更新UI选中样式
            const questionEl = document.getElementById(`question-${questionIndex}`);
            const opts = questionEl.querySelectorAll('.option');
            opts.forEach(opt => {
                const val = parseInt(opt.getAttribute('data-option'));
                if (val === optionIndex) opt.classList.add('selected');
                else opt.classList.remove('selected');
            });
            updateProgress();
            updateNavButtons();
            // 保存进度
            saveUnfinishedProgress();
        }

        function updateProgress() {
            const answeredCount = answers.filter(a => a !== null).length;
            const percent = (answeredCount / 30) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        function updateNavButtons() {
            if (isCompleted) return;
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            prev.disabled = (currentQuestion === 0);
            next.textContent = (currentQuestion === 29) ? '提交测试' : '下一题';
            if (answers[currentQuestion] === null) {
                next.disabled = true;
            } else {
                next.disabled = false;
            }
        }

        function nextQuestion() {
            if (isCompleted) return;
            if (currentQuestion < 29) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion++;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                updateNavButtons();
                saveUnfinishedProgress();  // 移动后保存当前进度
            } else {
                // 提交
                submitFinalResult();
            }
        }

        function prevQuestion() {
            if (isCompleted) return;
            if (currentQuestion > 0) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion--;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                updateNavButtons();
                saveUnfinishedProgress();
            }
        }

        // 全新开始测试 (清除所有旧存储，开始新问卷) — 仅用于未完成状态下的重置
        function freshStartTest() {
            if (isCompleted) {
                alert("你已经完成过灵魂发酵检测，无法再次测试。\n每颗灵魂只能发酵一次✨");
                return;
            }
            // 清空之前所有进度
            localStorage.removeItem(STORAGE_ANSWERS);
            localStorage.removeItem(STORAGE_CURRENT_Q);
            localStorage.removeItem(STORAGE_COMPLETED);
            localStorage.removeItem(STORAGE_RESULT);
            answers = new Array(30).fill(null);
            currentQuestion = 0;
            isCompleted = false;
            // 重新渲染干净问卷
            renderQuestionsWithSelections();
            coverDiv.style.display = 'none';
            questionnaireDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            loadingDiv.style.display = 'none';
            document.querySelectorAll('.question').forEach((q, idx) => {
                if (idx === 0) q.classList.add('active');
                else q.classList.remove('active');
            });
            updateProgress();
            updateNavButtons();
            saveUnfinishedProgress();
        }

        // 分享功能（替代再来一次）
        function shareDiagnosis() {
            const typeText = document.getElementById('resultType')?.innerText || "灵魂发酵档案";
            const statusText = document.getElementById('resultStatus')?.innerText || "";
            const traitsText = document.getElementById('resultTraits')?.innerText || "";
            const shareContent = `【灵魂发酵实验室】我的发酵诊断书：${typeText}\n${statusText}\n${traitsText}\n—— 灵魂只能发酵一次，独一无二。`;
            if (navigator.share) {
                navigator.share({ title: '灵魂发酵诊断书', text: shareContent }).catch(() => alert("分享取消"));
            } else {
                navigator.clipboard.writeText(shareContent).then(() => alert("诊断书已复制，快分享给朋友吧~"));
            }
        }

        // 初始化页面逻辑 (判断已完成 / 未完成)
        function initApp() {
            const completedFlag = localStorage.getItem(STORAGE_COMPLETED) === 'true';
            if (completedFlag) {
                // 已经完成测试 → 直接显示结果
                isCompleted = true;
                loadCompletedAndShow();
                return;
            }
            // 未完成 → 检查是否存在未完成答案草稿
            const savedAnswers = localStorage.getItem(STORAGE_ANSWERS);
            if (savedAnswers) {
                // 有未完成记录，直接恢复进度并展示问卷 (跳过封面)
                loadUnfinishedAndResume();
            } else {
                // 无任何记录，显示封面，等待用户开始
                coverDiv.style.display = 'block';
                questionnaireDiv.style.display = 'none';
                loadingDiv.style.display = 'none';
                resultDiv.style.display = 'none';
                isCompleted = false;
                answers = new Array(30).fill(null);
                currentQuestion = 0;
                // 预先生成干净DOM但不显示
                renderQuestionsWithSelections();
            }
        }

        // 事件绑定
        startBtn.addEventListener('click', () => {
            // 如果已经完成，不能开始
            if (localStorage.getItem(STORAGE_COMPLETED) === 'true') {
                alert("您已完成灵魂发酵检测，无法再次测试。\n每份灵魂诊断都是唯一的。");
                return;
            }
            // 如果有未完成进度则继续；否则全新开始
            const hasUnfinished = localStorage.getItem(STORAGE_ANSWERS) !== null;
            if (hasUnfinished) {
                loadUnfinishedAndResume();
            } else {
                freshStartTest();
            }
        });

        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        shareBtn.addEventListener('click', shareDiagnosis);

        // 启动
        initApp();
    </script>
</body>
</html>
