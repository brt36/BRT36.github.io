<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>搞钱天赋探测仪 | 财富DNA心理测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 24px 16px 64px;
            color: #1e293b;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 4px 8px rgba(0, 0, 0, 0.03);
            padding: 28px 24px;
            margin-bottom: 24px;
            transition: all 0.2s ease;
            border: 1px solid #eef2f6;
        }

        .hero {
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #fafcff 100%);
            border-bottom: 2px solid #e9edf2;
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1f3b3c, #2b5e5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .hero .sub {
            color: #5b6e8c;
            font-size: 0.95rem;
            margin-top: 6px;
            border-top: 1px solid #ecf3f9;
            display: inline-block;
            padding-top: 12px;
        }

        .badge {
            background: #eef3fc;
            color: #2c6e6f;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .question-item {
            margin-bottom: 28px;
            border-bottom: 1px solid #eff3f8;
            padding-bottom: 20px;
        }

        .q-text {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 14px;
            color: #0f172a;
        }

        .q-num {
            display: inline-block;
            background: #eef2ff;
            color: #2c6e6f;
            font-size: 0.7rem;
            font-weight: 600;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 12px;
            margin-right: 10px;
        }

        .rating-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .rating-option {
            flex: 1;
            text-align: center;
            min-width: 52px;
        }

        .rating-option input {
            display: none;
        }

        .rating-option label {
            display: block;
            background: #f8fafd;
            border-radius: 40px;
            padding: 8px 0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4b5e7c;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .rating-option input:checked + label {
            background: #2c6e6f;
            border-color: #2c6e6f;
            color: white;
            box-shadow: 0 2px 6px rgba(44,110,111,0.2);
        }

        .rating-option label:hover {
            background: #eef2f9;
            border-color: #cbd5e1;
        }

        .btn {
            background: #2c6e6f;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn:disabled {
            background: #b9c5ca;
            cursor: not-allowed;
            transform: none;
        }

        .report-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 24px;
            margin-top: 24px;
            border: 1px solid #eef2f6;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
        }

        .talent-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 12px 0 8px;
            background: linear-gradient(120deg, #1e3b3c, #2f7e7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .dimension-tag {
            display: inline-block;
            background: #ecfdf5;
            color: #2c6e6f;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 12px;
        }

        .radar-container {
            max-width: 280px;
            margin: 16px auto;
        }

        .insight-box {
            background: #f9fbfe;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eef2f8;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-badge {
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .disabled-overlay {
            opacity: 0.7;
            pointer-events: none;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8b9ab0;
            margin-top: 32px;
        }

        .lock-message {
            background: #fef9e6;
            border-left: 4px solid #e6b422;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #7a6300;
        }

        @media (max-width: 560px) {
            .card {
                padding: 20px 16px;
            }
            .rating-option label {
                font-size: 0.75rem;
                padding: 6px 0;
            }
            .q-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card hero">
        <div class="badge">🧠 心理测评 · 单次有效</div>
        <h1>💸 搞钱天赋探测仪</h1>
        <p style="margin-top: 8px; color: #475569;">你的财富DNA是什么？25题精准定位你的搞钱优势</p>
        <div class="sub">基于大五人格 & 创业人格维度 · 约4分钟 · 每人仅可测评一次</div>
    </div>

    <!-- 测试表单区（动态渲染） -->
    <div class="card" id="testArea">
        <div style="margin-bottom: 12px; font-weight: 500;">📋 请根据真实感受评分 (1=非常不符合 → 5=非常符合)</div>
        <form id="quizForm"></form>
        <button class="btn" id="submitBtn">✨ 生成我的搞钱报告</button>
    </div>

    <!-- 结果报告区 -->
    <div id="resultArea" style="display: none;"></div>
    <footer>基于心理学行为研究 · 结果仅供自我探索参考 · 本测试仅限作答一次</footer>
</div>

<script>
    // ---------- 25道题目 (5个维度各5题，保证均衡) ----------
    const questions = [
        // 风险嗅觉 (risk) 原有4题 + 新增1题
        { text: "当朋友推荐一个“有潜力但不确定”的副业项目时，我会先主动深入了解，而不是直接拒绝。", dim: "risk" },
        { text: "面对一笔10万元的投资机会，我能接受亏损20%的风险去博取更高回报。", dim: "risk" },
        { text: "即使所有人都说“别折腾了，安稳最重要”，我仍然想做点不一样的事情。", dim: "risk" },
        { text: "当周围人都在犹豫观望时，我常常是第一个尝试新东西的人。", dim: "risk" },
        { text: "我愿意用一部分闲置资金尝试高风险高回报的新兴领域（如加密货币、早期股权等）。", dim: "risk" }, // 新增
        
        // 社交影响力 (social) 原有4题 + 新增1题
        { text: "我擅长用清晰有感染力的方式向别人介绍一个想法或计划。", dim: "social" },
        { text: "我乐于参与行业活动、社交聚会，拓展自己的人脉圈。", dim: "social" },
        { text: "谈判或讨价还价对我来说并不是难事。", dim: "social" },
        { text: "我清楚自己的个人价值，敢于在商业场合主动要求应得的回报。", dim: "social" },
        { text: "我能够快速与陌生人建立信任，并让对方记住我的优势。", dim: "social" }, // 新增
        
        // 商业思维 (business) 原有4题 + 新增1题
        { text: "买东西时我会下意识计算卖方的成本和利润率。", dim: "business" },
        { text: "我能把一个复杂项目拆解成可执行的步骤，并找到盈利点。", dim: "business" },
        { text: "我经常思考如何把现有的技能或资源变成可持续的现金流。", dim: "business" },
        { text: "比起一份稳定但天花板低的工作，我更在意一件事的长期商业价值。", dim: "business" },
        { text: "我能快速判断一个商业模式是否健康，并指出其盈利关键节点。", dim: "business" }, // 新增
        
        // 韧性与执行力 (grit) 原有4题 + 新增1题
        { text: "即使短期赚不到钱，我也愿意为了一个长期目标持续投入时间和精力。", dim: "grit" },
        { text: "面对失败时，我更容易复盘反思，而不是长时间陷入沮丧。", dim: "grit" },
        { text: "当事情进展不顺，我会迅速调整策略，而不是停留在原地纠结。", dim: "grit" },
        { text: "我能在缺乏外部监督的情况下，自主推动自己的赚钱计划。", dim: "grit" },
        { text: "即便遇到多次拒绝或挫折，我仍会坚持尝试直到找到可行方案。", dim: "grit" }, // 新增
        
        // 财富动机 (motive) 原有4题 + 新增1题
        { text: "我相信普通人也能通过策略和努力积累财富，不觉得这是“命里注定”的事。", dim: "motive" },
        { text: "我会主动学习理财知识或关注财经信息。", dim: "motive" },
        { text: "我赚钱不只是为了消费，更是为了获得更多选择权和自由。", dim: "motive" },
        { text: "当看到别人赚钱时，我的第一反应是“他是怎么做到的”，而不是嫉妒。", dim: "motive" },
        { text: "我对实现财务自由有清晰的愿景和强烈的渴望。", dim: "motive" }  // 新增
    ];

    // 维度映射
    const dimNames = {
        risk: "风险嗅觉",
        social: "社交影响力",
        business: "商业思维",
        grit: "韧性与执行力",
        motive: "财富动机"
    };
    const dimOrder = ["risk", "social", "business", "grit", "motive"];
    let radarChart = null;
    // 存储锁定标志
    const STORAGE_KEY = "moneyTalentDone";
    const RESULT_KEY = "moneyTalentResult";

    // 检查是否已经完成测试 (单次锁定)
    function isTestCompleted() {
        return localStorage.getItem(STORAGE_KEY) === "true";
    }

    // 保存完成状态和报告数据（用于刷新后恢复）
    function saveCompletion(answers, reportHTML, scores, totalScore, talentType, radarData) {
        localStorage.setItem(STORAGE_KEY, "true");
        // 存储必要数据以便重建报告
        const data = {
            reportHTML: reportHTML,
            scores: scores,
            totalScore: totalScore,
            talentType: talentType,
            radarData: radarData,
            answers: answers  // 可选
        };
        localStorage.setItem(RESULT_KEY, JSON.stringify(data));
    }

    // 从存储恢复报告 (刷新后直接显示结果，阻止重新测试)
    function restoreReport() {
        const saved = localStorage.getItem(RESULT_KEY);
        if (saved && isTestCompleted()) {
            try {
                const data = JSON.parse(saved);
                // 显示报告区域
                document.getElementById("resultArea").style.display = "block";
                document.getElementById("resultArea").innerHTML = data.reportHTML;
                // 禁用测试区所有交互
                disableTestInterface(true);
                // 重新绘制雷达图 (因为canvas在恢复的html中)
                setTimeout(() => {
                    const ctx = document.getElementById('radarCanvas')?.getContext('2d');
                    if (ctx && data.radarData) {
                        if (radarChart) radarChart.destroy();
                        radarChart = new Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: dimOrder.map(d => dimNames[d]),
                                datasets: [{
                                    label: '你的维度分数',
                                    data: data.radarData,
                                    backgroundColor: 'rgba(44, 110, 111, 0.2)',
                                    borderColor: '#2c6e6f',
                                    borderWidth: 2,
                                    pointBackgroundColor: '#2c6e6f',
                                    pointBorderColor: '#fff',
                                    pointRadius: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                scales: { r: { beginAtZero: true, max: 25, ticks: { stepSize: 5, backdropColor: 'transparent' } } },
                                plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}分` } }, legend: { position: 'bottom' } }
                            }
                        });
                    }
                    // 重新绑定报告内的任何按钮（没有重测按钮，只会有可能的消息）
                }, 50);
                return true;
            } catch(e) { console.warn(e); }
        }
        return false;
    }

    // 禁用测试界面 (单次锁定后不能再作答)
    function disableTestInterface(disabled) {
        const form = document.getElementById("quizForm");
        const submitBtn = document.getElementById("submitBtn");
        if (disabled) {
            // 禁用所有radio
            const allRadios = document.querySelectorAll('#quizForm input[type="radio"]');
            allRadios.forEach(radio => radio.disabled = true);
            // 隐藏提交按钮或禁用
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = "✅ 已完成测评 (不可重测)";
                submitBtn.style.opacity = "0.6";
            }
            // 添加锁定提示卡片
            const lockMsg = document.createElement('div');
            lockMsg.className = "lock-message";
            lockMsg.innerHTML = "🔒 您已完成本次搞钱天赋测评，每人仅限一次。如需再次探索，请使用其他设备或清除浏览器数据（不推荐）。";
            const testArea = document.getElementById("testArea");
            if (!testArea.querySelector('.lock-message')) {
                testArea.insertBefore(lockMsg, testArea.firstChild);
            }
        } else {
            // 启用状态（初始）
            const allRadios = document.querySelectorAll('#quizForm input[type="radio"]');
            allRadios.forEach(radio => radio.disabled = false);
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = "✨ 生成我的搞钱报告";
                submitBtn.style.opacity = "1";
            }
            const existingLock = testArea.querySelector('.lock-message');
            if (existingLock) existingLock.remove();
        }
    }

    // 渲染所有题目
    function renderQuestions() {
        const form = document.getElementById("quizForm");
        form.innerHTML = "";
        questions.forEach((q, idx) => {
            const qDiv = document.createElement("div");
            qDiv.className = "question-item";
            qDiv.innerHTML = `
                <div class="q-text">
                    <span class="q-num">${idx+1}</span> ${q.text}
                </div>
                <div class="rating-group" data-qidx="${idx}">
                    ${[1,2,3,4,5].map(val => `
                        <div class="rating-option">
                            <input type="radio" name="q${idx}" id="q${idx}_${val}" value="${val}">
                            <label for="q${idx}_${val}">${val}</label>
                        </div>
                    `).join('')}
                </div>
            `;
            form.appendChild(qDiv);
        });
    }

    // 检查是否全部作答
    function checkAllAnswered() {
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            const checked = Array.from(radios).some(r => r.checked);
            if (!checked) {
                alert(`请先完成第 ${i+1} 题再查看报告 🙏`);
                const target = document.querySelector(`.question-item:nth-child(${i+1})`);
                if(target) target.scrollIntoView({ behavior: "smooth", block: "center" });
                return false;
            }
        }
        return true;
    }

    // 获取各维度分数 (每个维度5题，总分范围5-25)
    function getDimensionScores() {
        const scores = { risk: 0, social: 0, business: 0, grit: 0, motive: 0 };
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            let selectedVal = null;
            for (let r of radios) {
                if (r.checked) {
                    selectedVal = parseInt(r.value);
                    break;
                }
            }
            if (selectedVal !== null) {
                const dim = questions[i].dim;
                scores[dim] += selectedVal;
            }
        }
        return scores;
    }

    // 判定天赋类型 (基于5题维度分 5-25，调整阈值比例与原20分制一致：原14/20=0.7 → 17.5/25 → 取18为高；原11/20=0.55 → 13.75/25 → 取≤13为低)
    function determineTalentType(scores) {
        const r = scores.risk;
        const s = scores.social;
        const b = scores.business;
        const g = scores.grit;
        const m = scores.motive;
        
        const high = (val) => val >= 18;
        const mediumLow = (val) => val <= 13;
        
        // 开拓者: 高风险 + 低社交 (风险>=18 且 社交<=13)
        if (r >= 18 && s <= 13 && (r - s) >= 4) return "开拓者";
        // 连接者: 高社交 + 风险中等或偏低
        if (s >= 18 && r <= 17) return "连接者";
        // 操盘手: 高商业 + 高执行力
        if (b >= 18 && g >= 18) return "操盘手";
        // 猎人: 高动机 + 高风险
        if (m >= 18 && r >= 17) return "猎人";
        // 坚守者: 高韧性 + 风险中等偏低
        if (g >= 18 && r <= 16) return "坚守者";
        
        // 后备规则: 最高维度决定
        const dimVal = { risk: r, social: s, business: b, grit: g, motive: m };
        let maxDim = "risk";
        let maxVal = r;
        for (let [k, v] of Object.entries(dimVal)) {
            if (v > maxVal) { maxVal = v; maxDim = k; }
        }
        if (maxDim === "risk") return "开拓者";
        if (maxDim === "social") return "连接者";
        if (maxDim === "business") return "操盘手";
        if (maxDim === "grit") return "坚守者";
        if (maxDim === "motive") return "猎人";
        return "开拓者";
    }

    // 获取报告细节
    function getTalentDetails(type, scores, totalScore) {
        const detailsMap = {
            "开拓者": {
                slogan: "🚀 先机捕手 · 敢为人先",
                strengths: "创新敏锐，敢于试错，对新机会嗅觉灵敏。能在别人看不见的地方发现价值，是‘第一个吃螃蟹的人’。",
                directions: "投资分析、新兴行业创业、产品创新、早期项目参与、趋势套利。",
                actions: "✅ 用小成本试错，建立最小可行性产品验证想法。✅ 结交务实型伙伴，弥补落地短板。✅ 关注前沿资讯，保持信息差优势。",
                pitfalls: "⚠️ 警惕过于乐观导致盲目投入。⚠️ 避免忽视风险管控，建议设置止损线。"
            },
            "连接者": {
                slogan: "🤝 资源枢纽 · 人脉变现",
                strengths: "人脉广、善沟通，能从人际关系中创造商业价值。能把不同资源和人群连接起来，是‘破圈高手’。",
                directions: "销售、商务拓展、社群运营、品牌合作、知识付费、中介服务。",
                actions: "✅ 系统化经营人脉，定期维护弱关系。✅ 打造个人品牌，让信任为你背书。✅ 学会合作分成，放大杠杆。",
                pitfalls: "⚠️ 避免无效社交，要注重价值互换。⚠️ 别因顾及人情而忽略商业条款。"
            },
            "操盘手": {
                slogan: "📐 商业架构师 · 稳赚玩家",
                strengths: "逻辑缜密，擅长商业拆解，能把想法落地为盈利项目。天生会算账，将点子变成高效流水线。",
                directions: "项目运营、电商操盘、内容变现策划、供应链管理、数据分析变现。",
                actions: "✅ 把成功经验SOP化，建立可复用的系统。✅ 学习财务模型，提升ROI思维。✅ 用数据驱动决策。",
                pitfalls: "⚠️ 避免陷入过度分析而错过窗口期。⚠️ 注意团队沟通，不要只做孤狼。"
            },
            "坚守者": {
                slogan: "⛰️ 长期主义 · 厚积薄发",
                strengths: "耐得住寂寞，执行力强，对目标有持续投入的意志力。马拉松型选手，能在别人放弃的地方坚持。",
                directions: "长期投资、深耕型创业、专业技术变现、副业沉淀、知识IP。",
                actions: "✅ 定期复盘大方向，避免战术勤奋。✅ 建立里程碑奖励机制保持动力。✅ 培养输出习惯，积累复利。",
                pitfalls: "⚠️ 警惕因过于保守错过灵活风口。⚠️ 学会适时宣传自己，别让才华沉默。"
            },
            "猎人": {
                slogan: "⚡ 机会捕捉者 · 爆发冲刺",
                strengths: "动机强烈，对财富有清晰欲望，行动力爆发式。锁定目标就全力冲刺，短期变现能力强。",
                directions: "短期风口项目、高佣金岗位、快节奏电商、直播带货、流量变现。",
                actions: "✅ 做好风控和情绪管理，避免孤注一掷。✅ 建立信息收集网，快速试错迭代。✅ 留出安全资金垫。",
                pitfalls: "⚠️ 防止急功近利掉入骗局。⚠️ 注重长期积累，避免永远追风口。"
            }
        };
        const base = detailsMap[type];
        // 排序维度
        const dimArray = dimOrder.map(d => ({ name: dimNames[d], score: scores[d] }));
        dimArray.sort((a,b) => b.score - a.score);
        const top1 = dimArray[0];
        const top2 = dimArray[1];
        const top3 = dimArray[2];
        const growth = dimArray[dimArray.length-1];
        return { ...base, top1, top2, top3, growth, totalScore, type };
    }

    function getDimensionDesc(dimName, score) {
        const percent = (score/25)*100;
        if(percent >= 70) return "天赋突出，善于运用这一优势创造价值";
        if(percent >= 50) return "基础扎实，继续打磨能成为杀手锏";
        return "有成长空间，刻意练习后可大幅提升搞钱效率";
    }
    function getGrowthAdvice(dimName) {
        const map = {
            "风险嗅觉": "尝试小成本新项目，培养机会敏感度。",
            "社交影响力": "每周主动链接一位新朋友，练习表达观点。",
            "商业思维": "拆解一个成功案例的盈利模型，训练算账能力。",
            "韧性与执行力": "设定微小习惯，先完成再完美。",
            "财富动机": "阅读一本财富心理书籍，明确具体财务目标。"
        };
        return map[dimName] || "持续学习，结合优势发力。";
    }
    function getOneLiner(type) {
        const map = {
            "开拓者": "你的冒险精神是财富的探照灯，去照亮未知的领域吧。",
            "连接者": "世界是由关系编织的，你的纽带就是价值。",
            "操盘手": "把一切变成系统，财富自然高效流转。",
            "坚守者": "时间是你最好的朋友，复利终将厚待长期主义者。",
            "猎人": "机会从不等待犹豫者，保持精准出击的锐气。"
        };
        return map[type];
    }

    // 生成报告并锁定
    function generateAndLock() {
        if (isTestCompleted()) {
            alert("您已经完成过测评，无法再次测试。刷新页面可查看您的报告。");
            return false;
        }
        if (!checkAllAnswered()) return false;
        
        const scores = getDimensionScores();
        const totalScore = Object.values(scores).reduce((a,b)=>a+b,0);
        const talent = determineTalentType(scores);
        const details = getTalentDetails(talent, scores, totalScore);
        const radarData = dimOrder.map(d => scores[d]);
        
        // 构建报告HTML
        const reportHtml = `
            <div class="report-card" id="reportContainer">
                <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
                    <span class="dimension-tag">🧪 心理测评报告 · 单次有效</span>
                    <span class="score-badge">总分 ${totalScore}/125</span>
                </div>
                <div class="talent-title">${details.type} · ${details.slogan}</div>
                <div style="margin: 8px 0 4px; color: #2d6a6b;"><strong>核心摘要</strong></div>
                <p>你的搞钱天赋为「${details.type}」，在「${details.top1.name}」维度表现最突出（${details.top1.score}/25）。整体得分结构中，优势明显，呈现出独特的搞钱基因。</p>
                
                <div class="radar-container">
                    <canvas id="radarCanvas" width="300" height="300" style="width:100%; height:auto; max-width:280px; margin:0 auto; display:block;"></canvas>
                </div>
                
                <div class="insight-box">
                    <div style="font-weight: 700; margin-bottom: 12px;">📊 你的搞钱优势图谱</div>
                    <div>🎯 最强天赋：${details.top1.name} —— ${getDimensionDesc(details.top1.name, details.top1.score)}</div>
                    <div>⚡ 第二优势：${details.top2.name} —— ${getDimensionDesc(details.top2.name, details.top2.score)}</div>
                    <div>📈 第三维度：${details.top3.name} —— ${getDimensionDesc(details.top3.name, details.top3.score)}</div>
                    <div>🧩 成长空间：${details.growth.name} —— ${getGrowthAdvice(details.growth.name)}</div>
                </div>
                
                <div><span style="font-weight: 700;">✨ 适合你的搞钱方向</span><br>${details.directions}</div>
                <hr>
                <div><span style="font-weight: 700;">🎯 给你的行动锦囊</span><br>${details.actions}</div>
                <hr>
                <div><span style="font-weight: 700;">⚠️ 需要留意的坑</span><br>${details.pitfalls}</div>
                <hr>
                <div style="background: #f2f7f2; padding: 12px; border-radius: 20px; text-align: center; font-style: italic;">
                    💬 一句话总结：${getOneLiner(details.type)}
                </div>
                <div style="margin-top: 20px; text-align: center; font-size: 0.8rem; color: #7c8b9f;">
                    🔒 本测评仅限一次，刷新页面可查看本报告
                </div>
            </div>
        `;
        
        // 保存当前答案（用于存储，可选）
        const answers = {};
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            for (let r of radios) {
                if (r.checked) { answers[i] = r.value; break; }
            }
        }
        
        saveCompletion(answers, reportHtml, scores, totalScore, talent, radarData);
        
        // 显示报告区
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("resultArea").innerHTML = reportHtml;
        // 禁用测试界面
        disableTestInterface(true);
        
        // 绘制雷达图
        setTimeout(() => {
            const ctx = document.getElementById('radarCanvas')?.getContext('2d');
            if (ctx) {
                if (radarChart) radarChart.destroy();
                radarChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: dimOrder.map(d => dimNames[d]),
                        datasets: [{
                            label: '你的维度分数',
                            data: radarData,
                            backgroundColor: 'rgba(44, 110, 111, 0.2)',
                            borderColor: '#2c6e6f',
                            borderWidth: 2,
                            pointBackgroundColor: '#2c6e6f',
                            pointBorderColor: '#fff',
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: { r: { beginAtZero: true, max: 25, ticks: { stepSize: 5, backdropColor: 'transparent' } } },
                        plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}分` } }, legend: { position: 'bottom' } }
                    }
                });
            }
        }, 30);
        
        window.scrollTo({ top: 0, behavior: "smooth" });
        return true;
    }

    // 初始化：检查是否已完成，若完成则恢复报告并禁用测试；否则正常渲染
    function init() {
        renderQuestions();
        if (isTestCompleted()) {
            const restored = restoreReport();
            if (restored) {
                disableTestInterface(true);
                return;
            } else {
                // 如果恢复失败（数据损坏），清除标记让用户重测
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(RESULT_KEY);
                disableTestInterface(false);
            }
        } else {
            disableTestInterface(false);
        }
        // 绑定提交按钮
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.onclick = (e) => {
            e.preventDefault();
            generateAndLock();
        };
    }

    init();
</script>
</body>
</html>
